name: 🐛 Bug report
description: Report a defect so we can fix it.
title: 'fix: <short description>'
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please search existing issues first.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - web (frontend)
        - api (backend)
        - database / migrations
        - infrastructure / CI / Docker
        - documentation
        - not sure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node version, deployment (local/staging/prod), version/commit.
      placeholder: |
        - OS: macOS 15.1
        - Browser: Chrome 131
        - App version / commit:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or attach screenshots. Redact any secrets.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I have removed any secrets or personal data from this report.
          required: true
