name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan — Mondays at 06:00 UTC.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    # Code scanning upload requires the feature enabled: free on public repos,
    # but GitHub Advanced Security (paid) on private ones. Skip on private repos
    # so apps generated from this template don't get a permanently-failing
    # check. Remove this guard (or enable Advanced Security) to scan a private
    # repo. See docs/TECH_DEBT.md.
    if: github.event.repository.visibility == 'public'
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
