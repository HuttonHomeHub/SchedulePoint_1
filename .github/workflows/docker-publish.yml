name: Publish container images

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (defaults to git sha)'
        required: false
  # Called by the Release workflow when a version lands, so publishing is fully
  # automatic. The default GITHUB_TOKEN cannot make a tag push trigger a separate
  # workflow, so Release invokes this reusable workflow directly instead.
  workflow_call:
    inputs:
      version:
        description: 'Release version to tag the images with (e.g. 0.2.1).'
        required: false
        type: string

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & push ${{ matrix.app }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GitHub Container Registry
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            dockerfile: apps/api/Dockerfile
          - app: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}
            type=sha
            # On a branch/dispatch build (and on the release call, which inherits
            # the push-to-main context) this also tags the branch name, e.g.
            # `:main` — which docker-compose.release.yml defaults IMAGE_TAG to.
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
