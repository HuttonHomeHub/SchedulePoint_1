name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  quality:
    name: Format, lint, typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @repo/api prisma:generate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build (api + web)
        run: pnpm build

  template:
    name: Verify feature template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Materialise, type-check, and unit-test the canonical reference template
      # so it can never silently rot (see docs/REFERENCE_FEATURE.md, ADR-0015).
      - name: Verify reference template
        run: bash scripts/verify-template.sh

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    # A disposable PostgreSQL for API end-to-end tests (Supertest).
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/app_test?schema=public
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The Playwright API web server runs the compiled app (`nest start` →
      # `node dist/main.js`), which resolves `@repo/types` to its built output
      # (`exports.default` → `dist/`). Unlike the Turbo-driven `quality` job,
      # this job runs those steps directly, so it must build the shared package
      # first — otherwise the web e2e web server crashes with MODULE_NOT_FOUND.
      - name: Build shared packages
        run: pnpm --filter @repo/types build

      - name: Generate Prisma client
        run: pnpm --filter @repo/api prisma:generate

      - name: Apply database migrations
        run: pnpm --filter @repo/api prisma:deploy

      # API e2e (Supertest) and web e2e (Playwright) run sequentially — they
      # share the test database, so running them in parallel could race.
      - name: API end-to-end tests
        run: pnpm --filter @repo/api test:e2e

      - name: Install Playwright browsers
        run: pnpm --filter @repo/web exec playwright install --with-deps

      # Playwright starts the API and web dev servers itself (see
      # apps/web/playwright.config.ts) and drives the full stack in a browser.
      # This run serves the app FLAG-OFF (read-only surface, pen inert).
      - name: Web end-to-end tests
        run: pnpm --filter @repo/web test:e2e

      # Flag-ON editing journeys: a second Playwright run (playwright.edit.config.ts)
      # serving the app with VITE_TSLD_EDITING + VITE_PLAN_EDIT_LOCK on and the API
      # enforcing the lock (PLAN_EDIT_LOCK_ENFORCED=true), so on-canvas editing and the
      # pen are really exercised (TECH_DEBT #25b/#27b). It runs after the flag-off run
      # tears down its servers, reusing the same ports.
      - name: Web end-to-end tests (editing flags on)
        run: pnpm --filter @repo/web test:e2e:edit

      # Flag-ON canvas-first workspace journey (playwright.workspace.config.ts) serving the app
      # with VITE_CANVAS_WORKSPACE on (plus the editing flags + enforced pen), so the canvas-first
      # plan surface — canvas + drag-resizable bottom activity panel + overflow menu — is exercised
      # end to end (ADR-0030). Runs after the prior runs tear down their servers, reusing the ports.
      - name: Web end-to-end tests (canvas workspace flag on)
        run: pnpm --filter @repo/web test:e2e:workspace

      # Flag-ON canvas-maximal toolbar journey (playwright.toolbar.config.ts) serving the app with
      # VITE_CANVAS_TOOLBAR on (layered on VITE_CANVAS_WORKSPACE + the editing flags + enforced pen),
      # so the toolbar-hosted workspace — slim header + one command toolbar over a chromeless canvas,
      # activities panel collapsed by default — is exercised end to end (ADR-0031). Runs last, after
      # the prior runs tear down their servers, reusing the ports.
      - name: Web end-to-end tests (canvas toolbar flag on)
        run: pnpm --filter @repo/web test:e2e:toolbar

      # Flag-ON canvas-first authoring journey (playwright.authoring.config.ts) serving the app with
      # VITE_CANVAS_AUTHORING on (layered on the toolbar/workspace/editing/pen flags), so building a
      # plan directly on the canvas — blank-canvas first draw, inline start date, auto-recalc,
      # on-canvas milestones, two-click linking — is exercised end to end (ADR-0032). Runs last,
      # after the prior runs tear down their servers, reusing the ports.
      - name: Web end-to-end tests (canvas authoring flag on)
        run: pnpm --filter @repo/web test:e2e:authoring

      # Flag-ON live cross-plan / programme scheduling journey (playwright.programme.config.ts) serving
      # the app with VITE_PROGRAMME_SCHEDULING on (plus VITE_INTER_PROJECT_DATES, on the legacy stacked
      # plan-detail page with the pen off), so drawing a live cross-plan link and running a programme
      # recalculate — the result panel, the driven "External" badge, and the staleness cycle — is
      # exercised end to end (ADR-0045 F8). Runs last, after the prior runs tear down their servers.
      - name: Web end-to-end tests (programme scheduling flag on)
        run: pnpm --filter @repo/web test:e2e:programme

      # Flag-ON Notes journey (playwright.notes.config.ts) serving the app with VITE_NOTES on (on the
      # legacy stacked plan-detail page with the pen off — notes are not pen-gated), so adding, editing
      # and deleting an activity note, the per-row count badge tracking it, and an axe pass are
      # exercised end to end (ADR-0046). Runs last, after the prior runs tear down their servers.
      - name: Web end-to-end tests (notes flag on)
        run: pnpm --filter @repo/web test:e2e:notes

      # Flag-ON undo/redo journey (playwright.undo.config.ts) serving the app with VITE_UNDO_REDO on
      # (layered on the canvas authoring/toolbar/workspace/editing/pen flags, with the pen enforced), so
      # the user-visible undo surface — the toolbar Undo/Redo controls, the Ctrl/Cmd+Z keybinding, the
      # announcements — is exercised end to end (ADR-0048 M3). Runs last, after the prior runs tear down
      # their servers, reusing the ports.
      - name: Web end-to-end tests (undo/redo flag on)
        run: pnpm --filter @repo/web test:e2e:undo

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/playwright-report-edit/
            apps/web/playwright-report-workspace/
            apps/web/playwright-report-toolbar/
            apps/web/playwright-report-authoring/
            apps/web/playwright-report-programme/
            apps/web/playwright-report-notes/
            apps/web/playwright-report-undo/
          if-no-files-found: ignore
          retention-days: 7

  image:
    name: Build & smoke-boot images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # Build the api + web images from source and boot the full stack
      # (Postgres + API + web), then wait for every container to report healthy.
      # This exercises the one artifact users actually run — the container —
      # which the source-level jobs never do, so runtime-only regressions
      # (module resolution, Prisma client generation, entrypoint migrations,
      # missing prod dependencies) are caught here rather than in production.
      # See ADR-0020.
      - name: Build & boot the stack
        run: >-
          docker compose -f docker-compose.yml -f docker-compose.ci.yml
          up -d --build --wait --wait-timeout 240

      - name: Smoke-test the API health endpoint
        run: curl -fsS --retry 5 --retry-all-errors --retry-delay 3 http://localhost:3000/api/v1/health

      - name: Smoke-test the web app
        run: curl -fsS --retry 5 --retry-all-errors --retry-delay 3 -o /dev/null http://localhost:8080/

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
