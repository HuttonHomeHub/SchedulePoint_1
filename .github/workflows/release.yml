name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Version & tag
    runs-on: ubuntu-latest
    permissions:
      contents: write # push version commits and the vX.Y.Z tag
      pull-requests: write # open/update the "Version Packages" PR
    outputs:
      api_version: ${{ steps.meta.outputs.api_version }}
      web_version: ${{ steps.meta.outputs.web_version }}
      publish_api: ${{ steps.meta.outputs.publish_api }}
      publish_web: ${{ steps.meta.outputs.publish_web }}
      release: ${{ steps.meta.outputs.release }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # When there are pending changesets this opens/updates the "Version
      # Packages" PR (bumping versions + writing CHANGELOG.md). When that PR is
      # merged, no changesets remain (hasChangesets == 'false') and the bumped
      # versions are already on this commit â€” that is a release.
      #
      # We do NOT use a `publish` command here: `changeset publish` is npm-only
      # and no-ops on our private packages (so it never creates a tag). Tagging
      # and image publishing are handled explicitly below.
      - name: Create release pull request
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # A release lands when the "Version Packages" PR was just merged: no
      # changesets remain AND a package's version has no git tag yet. Each app is
      # tagged INDEPENDENTLY â€” `api-vX.Y.Z` / `web-vX.Y.Z` â€” because their versions
      # bump on their own cadence (Changesets bumps only the packages a changeset
      # names). A single aggregate `v{max}` tag could NOT represent a web-only bump
      # once web caught up to api's version: `max(0.7.0, 0.7.0)` is `v0.7.0`, which
      # api had already tagged, so the web release was silently skipped (ADR-0027).
      # Per-package tags are monotonic per package, so that collision can't recur.
      #
      # NOTE: `hasChangesets` is a changesets/action@v1 output (camelCase). v2
      # renames it to `has-changesets`; update this expression when bumping the
      # major, or the gate silently reads empty and releases stop tagging.
      - name: Determine release
        id: meta
        run: |
          API_VERSION="$(node -p "require('./apps/api/package.json').version")"
          WEB_VERSION="$(node -p "require('./apps/web/package.json').version")"
          echo "api_version=$API_VERSION" >> "$GITHUB_OUTPUT"
          echo "web_version=$WEB_VERSION" >> "$GITHUB_OUTPUT"
          PUBLISH_API=false
          PUBLISH_WEB=false
          if [ "${{ steps.changesets.outputs.hasChangesets }}" = "false" ]; then
            git rev-parse "refs/tags/api-v$API_VERSION" >/dev/null 2>&1 || PUBLISH_API=true
            git rev-parse "refs/tags/web-v$WEB_VERSION" >/dev/null 2>&1 || PUBLISH_WEB=true
          fi
          echo "publish_api=$PUBLISH_API" >> "$GITHUB_OUTPUT"
          echo "publish_web=$PUBLISH_WEB" >> "$GITHUB_OUTPUT"
          if [ "$PUBLISH_API" = "true" ] || [ "$PUBLISH_WEB" = "true" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Releasing: api=$PUBLISH_API (v$API_VERSION), web=$PUBLISH_WEB (v$WEB_VERSION)."
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No release to tag (pending changesets, or both app versions already tagged)."
          fi

      - name: Configure git author
        if: steps.meta.outputs.release == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      # Tag + publish a GitHub Release for each app that just released, in
      # independent steps so a transient failure tagging one app doesn't block the
      # other's ready release. Only an app whose version has no tag yet is tagged
      # (the gate above), so re-runs are idempotent.
      - name: Tag api release
        if: steps.meta.outputs.publish_api == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="api-v${{ steps.meta.outputs.api_version }}"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
          gh release create "$tag" --title "$tag" --generate-notes

      - name: Tag web release
        if: steps.meta.outputs.publish_web == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="web-v${{ steps.meta.outputs.web_version }}"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
          gh release create "$tag" --title "$tag" --generate-notes

  # Build + push the container images for the release. Invoked directly (rather
  # than via the tag push above, which the default GITHUB_TOKEN cannot use to
  # trigger another workflow) so publishing is fully automatic. Each app's image
  # is tagged with ITS OWN package version, and only the app(s) that released are
  # (re)built â€” so an unreleased app's version tag never moves to drifted content.
  publish:
    name: Publish images
    needs: release
    if: needs.release.outputs.release == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-publish.yml
    with:
      api_version: ${{ needs.release.outputs.api_version }}
      web_version: ${{ needs.release.outputs.web_version }}
      publish_api: ${{ needs.release.outputs.publish_api == 'true' }}
      publish_web: ${{ needs.release.outputs.publish_web == 'true' }}
