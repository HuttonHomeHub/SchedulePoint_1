# CI smoke-boot override — layer on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build --wait
#
# Boots the images built from source with development-safe config so the API's
# production config guards (strong secret, trusted proxies, non-local CORS) do
# not refuse to start during a health smoke test. This is NOT a production
# profile — real deployment is described in docs/DEPLOYMENT.md.

services:
  api:
    environment:
      # The `quality`/`e2e` jobs cover behaviour; this job only proves the
      # container boots and serves health, so run it under the development
      # profile to bypass the production-only startup guards.
      NODE_ENV: development
