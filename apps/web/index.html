<!doctype html>
<html lang="en-GB" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>SchedulePoint</title>
    <script>
      // Apply the persisted theme before first paint to avoid a flash of the
      // wrong theme (see docs/FRONTEND_ARCHITECTURE.md → Theme management).
      (function () {
        try {
          var stored = localStorage.getItem('schedulepoint-theme');
          var system = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored === 'dark' || ((stored === 'system' || !stored) && system);
          document.documentElement.classList.toggle('dark', dark);
        } catch (_) {
          /* localStorage unavailable — fall back to light. */
        }
      })();
    </script>
  </head>
  <body class="h-full">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
