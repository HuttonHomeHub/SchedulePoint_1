# nginx config for serving the Blank App SPA.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache fingerprinted assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Proxy API + auth requests to the API service so the SPA can call them
  # same-origin (cookies flow, no CORS). The upstream is the container/service
  # named `api` on the same network (see docker-compose*.yml); other deployments
  # front both behind an ingress or override this config.
  location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback: route everything else to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Baseline security headers (tune CSP once the app's origins are known).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml;
}
